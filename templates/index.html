<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuu - Hoş Geldiniz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen flex flex-col items-center justify-center font-sans p-4 relative overflow-hidden">
    <div class="absolute top-[-10%] left-[-10%] w-96 h-96 bg-blue-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-50"></div>
    <div class="absolute bottom-[-10%] right-[-10%] w-96 h-96 bg-purple-500 rounded-full mix-blend-multiply filter blur-[128px] opacity-50"></div>

    <div class="z-10 text-center mb-12">
        <h1 class="text-6xl font-black text-white tracking-widest drop-shadow-lg mb-2">TABUU</h1>
        <p class="text-slate-400 text-lg font-medium tracking-wide">Almanca İnteraktif Kelime Oyunu</p>
    </div>

    <div class="z-10 grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-2xl">
        <a href="/ogrenci" class="group bg-white/10 hover:bg-white/20 border border-white/20 backdrop-blur-sm p-8 rounded-2xl flex flex-col items-center justify-center transition-all hover:scale-105 hover:shadow-[0_0_30px_rgba(59,130,246,0.3)]">
            <div class="text-6xl mb-4 group-hover:animate-bounce">🎓</div>
            <h2 class="text-2xl font-bold text-white mb-2">Öğrenci Girişi</h2>
            <p class="text-slate-400 text-sm text-center">Oda ID'si ile derse katılın</p>
        </a>

        <a href="/admin" class="group bg-indigo-600/80 hover:bg-indigo-500 border border-indigo-400/50 backdrop-blur-sm p-8 rounded-2xl flex flex-col items-center justify-center transition-all hover:scale-105 hover:shadow-[0_0_30px_rgba(99,102,241,0.5)]">
            <div class="text-6xl mb-4 group-hover:rotate-12 transition-transform">👨‍🏫</div>
            <h2 class="text-2xl font-bold text-white mb-2">Öğretmen Girişi</h2>
            <p class="text-indigo-200 text-sm text-center">Yönetim paneli ve tahta</p>
        </a>
    </div>
</body>
</html>
