<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuu - Oyuncu Ekranı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-slate-100 min-h-screen flex flex-col font-sans transition-colors duration-300">

    <div class="bg-blue-600 text-white p-4 shadow-md flex justify-between items-center rounded-b-2xl">
        <div class="font-bold text-lg">👨‍🎓 <span id="kullanici_adi_gostergesi">Oyuncu</span></div>
        <div class="bg-blue-800 px-3 py-1 rounded-full text-xs font-black tracking-widest shadow-inner">OYUNDA</div>
    </div>

    <div class="flex-1 p-4 flex flex-col">
        <div class="bg-white rounded-2xl shadow-sm p-4 mb-4 flex justify-between items-center border border-slate-200">
            <div class="text-center w-1/3">
                <p id="isim_a_oyun" class="text-xs font-bold text-slate-400 uppercase">Takım A</p>
                <p id="skor_a" class="text-2xl font-black text-blue-600">0</p>
            </div>
            <div class="text-center w-1/3 bg-slate-800 px-2 py-2 rounded-xl shadow-inner">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1">SÜRE</p>
                <p id="sayac" class="text-4xl font-black text-red-500 font-mono">90</p>
            </div>
            <div class="text-center w-1/3">
                <p id="isim_b_oyun" class="text-xs font-bold text-slate-400 uppercase">Takım B</p>
                <p id="skor_b" class="text-2xl font-black text-green-600">0</p>
            </div>
        </div>

        <div id="kelime_karti" class="flex-1 bg-white rounded-3xl shadow-lg border-t-8 border-slate-800 p-6 flex flex-col justify-center items-center relative overflow-hidden transition-all">
            <div id="durum_mesaji" class="text-center">
                <div class="animate-bounce text-4xl mb-4">⏳</div>
                <h2 class="text-xl font-black text-slate-700">LÜTFEN BEKLEYİNİZ</h2>
                <p class="text-slate-500 text-sm mt-2 font-medium">Oyun hocanız tarafından başlatılacak...</p>
            </div>

            <div id="aktif_kelime_alani" class="hidden w-full text-center">
                <span id="k_seviye" class="absolute top-4 right-4 bg-slate-100 text-slate-600 px-3 py-1 rounded-full text-xs font-bold border border-slate-200"></span>
                <p class="text-sm font-bold text-slate-400 uppercase tracking-widest mb-2">Hedef Kelime</p>
                <h1 id="k_kelime" class="text-4xl sm:text-5xl font-black text-slate-800 mb-8 break-words uppercase"></h1>
                
                <div class="bg-red-50 rounded-2xl p-4 border border-red-100 w-full max-w-sm mx-auto shadow-inner">
                    <p class="text-xs font-black text-red-400 uppercase tracking-widest mb-3 flex items-center justify-center gap-1"><span>🚫</span> YASAKLI KELİMELER</p>
                    <ul id="k_yasaklilar" class="space-y-2 text-lg font-bold text-slate-700 uppercase"></ul>
                </div>
            </div>
        </div>
    </div>

    <script>
        const socket = io();
        const oyuncuIsmi = localStorage.getItem('tabuu_oyuncu_ismi') || 'Misafir_' + Math.floor(Math.random()*1000);
        document.getElementById('kullanici_adi_gostergesi').innerText = oyuncuIsmi;

        socket.on('connect', () => { socket.emit('oyuna_katil', {isim: oyuncuIsmi}); });

        socket.on('oyun_sifirlandi', function() {
            alert("Oyun hocanız tarafından sonlandırıldı veya yeniden başlatıldı.");
            window.location.href = "/";
        });

        // YENİ: İsimleri ve süreleri güncelleyen dinleyici
        socket.on('ayarlar_guncellendi', function(data) {
            document.getElementById('isim_a_oyun').innerText = data.takim_a_isim;
            document.getElementById('isim_b_oyun').innerText = data.takim_b_isim;
            if(document.getElementById('sayac').innerText === "90") {
                document.getElementById('sayac').innerText = data.sure;
            }
        });

        socket.on('skor_guncellendi', function(data) {
            document.getElementById('skor_a').innerText = data.takim_a_skor;
            document.getElementById('skor_b').innerText = data.takim_b_skor;
        });

        socket.on('yeni_kelime_geldi', function(paket) {
            const k = paket.kelime_verisi;
            if(paket.anlatici === oyuncuIsmi) {
                document.getElementById('durum_mesaji').classList.add('hidden');
                document.getElementById('aktif_kelime_alani').classList.remove('hidden');
                document.getElementById('k_seviye').innerText = k.seviye;
                document.getElementById('k_kelime').innerText = k.kelime;
                
                const ul = document.getElementById('k_yasaklilar');
                ul.innerHTML = '';
                k.yasaklilar.forEach(yasakli => {
                    if(yasakli && yasakli.trim() !== "") {
                        ul.innerHTML += `<li class="border-b border-red-100 pb-1 last:border-0">${yasakli}</li>`;
                    }
                });
                document.getElementById('kelime_karti').classList.remove('border-slate-800');
                document.getElementById('kelime_karti').classList.add('border-blue-500', 'ring-4', 'ring-blue-100');
            } else {
                document.getElementById('durum_mesaji').classList.remove('hidden');
                document.getElementById('aktif_kelime_alani').classList.add('hidden');
                document.getElementById('durum_mesaji').innerHTML = `
                    <div class="text-4xl mb-4">🎤</div>
                    <h2 class="text-xl font-black text-slate-700">SIRA SENDE DEĞİL</h2>
                    <p class="text-blue-600 font-bold mt-2 text-lg uppercase">${paket.anlatici}</p>
                    <p class="text-slate-500 text-sm font-medium">anlatıyor, dikkatle dinle!</p>`;
                document.getElementById('kelime_karti').classList.add('border-slate-800');
                document.getElementById('kelime_karti').classList.remove('border-blue-500', 'ring-4', 'ring-blue-100');
            }
        });

        let sayacInterval;
        let globalKalanSure = 90;

        socket.on('sayac_basladi', function(data) { sayaciDondur(data.sure); });
        socket.on('sayac_devam_ediyor', function(data) { sayaciDondur(data.sure); });
        socket.on('sayac_beklemede', function() { clearInterval(sayacInterval); });
        socket.on('sayac_durdu', function() { clearInterval(sayacInterval); });

        function sayaciDondur(sure) {
            clearInterval(sayacInterval); 
            globalKalanSure = sure;
            document.getElementById('sayac').innerText = globalKalanSure;
            
            sayacInterval = setInterval(() => {
                globalKalanSure--;
                if(globalKalanSure <= 0) {
                    globalKalanSure = 0;
                    clearInterval(sayacInterval); 
                }
                document.getElementById('sayac').innerText = globalKalanSure;
            }, 1000);
        }

        socket.on('dogru_bildi_animasyonu', function(data) {
            clearInterval(sayacInterval); 
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
        });

        socket.on('tabuu_animasyonu', function(data) {
            clearInterval(sayacInterval); 
            document.body.classList.add('bg-red-600');
            document.body.classList.remove('bg-slate-100');
            setTimeout(() => {
                document.body.classList.add('bg-slate-100');
                document.body.classList.remove('bg-red-600');
            }, 1000);
        });
    </script>
</body>
</html>
