<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabuu - Ana Ekran</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8 overflow-hidden flex flex-col">
    <div class="flex justify-between items-center bg-slate-800 p-8 rounded-3xl shadow-2xl mb-12 border-b-4 border-slate-700">
        <div class="text-center w-1/3">
            <h2 class="text-4xl text-blue-400 font-black tracking-widest mb-2 uppercase">Takım A</h2>
            <div id="skor_a" class="text-8xl font-black text-white">0</div>
        </div>
        <div class="text-center w-1/3 bg-slate-900 py-6 rounded-3xl border border-slate-700 shadow-inner">
            <p id="sayac_baslik" class="text-slate-400 font-bold tracking-widest uppercase mb-2">KALAN SÜRE</p>
            <div id="sayac" class="text-9xl font-black text-red-500 font-mono">90</div>
        </div>
        <div class="text-center w-1/3">
            <h2 class="text-4xl text-green-400 font-black tracking-widest mb-2 uppercase">Takım B</h2>
            <div id="skor_b" class="text-8xl font-black text-white">0</div>
        </div>
    </div>
    <div class="text-center mb-12 flex-1 flex flex-col justify-center">
        <p class="text-slate-400 text-2xl font-bold mb-4 uppercase tracking-[0.3em]">🎤 ANLATIYOR 🎤</p>
        <div id="aktif_isim_kutusu" class="transition-all duration-700 transform"><div id="aktif_oyuncu" class="text-7xl font-black text-slate-300">BEKLENİYOR...</div></div>
        <p id="siradaki_oyuncu" class="text-slate-500 text-xl mt-12 bg-slate-800 inline-block mx-auto px-6 py-2 rounded-full border border-slate-700">Sıradaki: Hazırlanıyor...</p>
    </div>
    <div class="grid grid-cols-3 gap-8 mt-auto">
        <div class="bg-slate-800 rounded-2xl p-6 border-t-4 border-blue-500"><h3 class="text-xl font-bold text-blue-400 mb-4 border-b border-slate-700 pb-2">Takım A</h3><ul id="liste_takim_a" class="space-y-2"></ul></div>
        <div class="bg-slate-800 rounded-2xl p-6 border-t-4 border-slate-500 opacity-80"><h3 class="text-xl font-bold text-slate-400 mb-4 border-b border-slate-700 pb-2">⏳ Bekleme Salonu</h3><ul id="liste_bekleme" class="space-y-2"></ul></div>
        <div class="bg-slate-800 rounded-2xl p-6 border-t-4 border-green-500"><h3 class="text-xl font-bold text-green-400 mb-4 border-b border-slate-700 pb-2">Takım B</h3><ul id="liste_takim_b" class="space-y-2"></ul></div>
    </div>
    <script>
        const socket = io();
        const audioCorrect = new Audio('/static/sounds/correct.mp3');
        const audioFail = new Audio('/static/sounds/fail.mp3');
        const audioBeep = new Audio('/static/sounds/beep.mp3');
        let sayacInterval, aktifTakim = 'A', oyuncuListeleri = { bekleme: [], takim_a: [], takim_b: [] };

        socket.on('connect', () => { socket.emit('tahta_baglandi'); });
        socket.on('skor_guncellendi', function(data) {
            document.getElementById('skor_a').innerText = data.takim_a_skor;
            document.getElementById('skor_b').innerText = data.takim_b_skor;
            aktifTakim = data.aktif_takim;
            sahneyiGuncelle();
        });
        socket.on('oyuncular_guncellendi', function(data) {
            oyuncuListeleri = data;
            listeyiCiz('liste_bekleme', data.bekleme, 'text-slate-400');
            listeyiCiz('liste_takim_a', data.takim_a, 'text-blue-300');
            listeyiCiz('liste_takim_b', data.takim_b, 'text-green-300');
            sahneyiGuncelle();
        });
        function listeyiCiz(elementId, liste, textClass) {
            const ul = document.getElementById(elementId);
            ul.innerHTML = '';
            liste.forEach((isim, index) => {
                let stil = index === 0 ? `${textClass} font-black` : 'text-slate-500';
                ul.innerHTML += `<li class="${stil}">${index + 1}. ${isim}</li>`;
            });
        }
        function sahneyiGuncelle() {
            const aktif = aktifTakim === 'A' ? oyuncuListeleri.takim_a : oyuncuListeleri.takim_b;
            const rakip = aktifTakim === 'A' ? oyuncuListeleri.takim_b : oyuncuListeleri.takim_a;
            const isimEkrani = document.getElementById('aktif_oyuncu');
            isimEkrani.innerText = aktif.length > 0 ? aktif[0] : "SEÇİM BEKLENİYOR...";
            document.getElementById('siradaki_oyuncu').innerText = `Sıradaki: ${rakip.length > 0 ? rakip[0] : "Yok"}`;
        }
        socket.on('dogru_bildi_animasyonu', function() { audioCorrect.play(); confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } }); });
        socket.on('tabuu_animasyonu', function() { audioFail.play(); yagdirUzgunYuz(); });
        function yagdirUzgunYuz() {
            const sad = confetti.shapeFromText({ text: '😢' });
            const end = Date.now() + 2000;
            (function frame() {
                confetti({ particleCount: 5, angle: 270, spread: 120, origin: { x: Math.random(), y: -0.1 }, shapes: [sad], scalar: 3, gravity: 1.5, colors: ['#ffffff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());
        }
        socket.on('sayac_basladi', function(data) { sayaciDondur(data.sure); });
        socket.on('sayac_durdu', function() { clearInterval(sayacInterval); });
        function sayaciDondur(sure) {
            let kalan = sure;
            sayacInterval = setInterval(() => {
                kalan--; document.getElementById('sayac').innerText = kalan;
                if(kalan <= 7) audioBeep.play();
                if(kalan <= 0) { clearInterval(sayacInterval); yagdirUzgunYuz(); }
            }, 1000);
        }
    </script>
</body>
</html>
